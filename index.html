<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glorious Education Care - Live Online Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #1b5e20; --accent: #0078d4; --danger: #d32f2f; --table-border: #000; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #bee2a4cb; margin: 0; padding: 10px; }
        .container { max-width: 297mm; width: 100%; margin: auto; background: #fff; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.1); overflow: hidden; }
        
        .admin-only { display: none; }
        .is-admin .admin-only { display: inline-block; }
        
        .excel-header { background: linear-gradient(to right, #76b852 0%, #8dc26f 60%, #e1f291 100%) !important; padding: 15px 20px; border-bottom: 3px solid #1b5e20; -webkit-print-color-adjust: exact; }
        .bismillah { text-align: center; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .header-content { display: flex; align-items: center; justify-content: space-between; }
        .header-logo { height: 80px; width: 80px; background: white; border-radius: 50%; border: 2px solid #1b5e20; object-fit: contain; }
        
        .main-title-box { background: #002233; color: white !important; padding: 4px 20px; border-radius: 0 40px 40px 40px; }
        .main-title-box h1 { margin: 0; font-size: 26px; text-transform: uppercase; display: inline; }
        .header-right-address { text-align: right; font-size: 11px; font-weight: bold; }

        .info-bar { background: #e8f5e9 !important; padding: 10px; border-bottom: 1px solid #c8e6c9; display: flex; justify-content: center; gap: 30px; font-weight: bold; align-items: center; }
        
        #topHoldersBox { display: none; margin: 15px; padding: 15px; border: 2px solid var(--primary); background: #fff; }
        .top-title { font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: 10px; }
        .top-list-container { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
        .rank-item { display: flex; align-items: center; padding: 3px 0; border-bottom: 1px dashed #ccc; font-size: 13px; font-weight: bold; }

        .controls-panel { background: #f5f5f5; padding: 15px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-items: center; border-bottom: 1px solid #ddd; }
        input, select { padding: 6px; border: 1px solid #999; border-radius: 4px; font-weight: bold; }
        button { padding: 7px 12px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; color: white; font-size: 12px; }
        
        .table-wrap { padding: 10px; overflow-x: auto; max-height: 600px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid var(--table-border); padding: 6px 3px; text-align: center; }
        th { background: #f0f0f0; color: #1b5e20; }
        
        .status-badge { padding: 2px 4px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .pass { background: #c8e6c9; color: #1b5e20; }
        .fail { background: #ffcdd2; color: #b71c1c; }
        
        .mark-input { width: 100%; border: none; text-align: center; font-weight: bold; background: transparent; }
        .is-admin .mark-input { background: #fffbe6; border: 1px solid #eee; }
        
        @media print { .controls-panel, .admin-only, #loginBtn { display: none !important; } }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <div class="excel-header">
        <p class="bismillah">বিসমিল্লাহির রাহমানির রাহিম</p>
        <div class="header-content">
            <div class="header-left">
                <img src="logo.jpeg" alt="Logo" class="header-logo">
                <div class="main-title-box"><h1>GLORIOUS</h1><span>Education Care</span></div>
            </div>
            <div class="header-right-address">ফরিদুল হক চৌধুরী মার্কেট, পেকুয়া।<br>📞 ০১৮৬৮-৬৫৩৭২২</div>
        </div>
    </div>
    
    <div class="info-bar">
        <span>Exam: <span id="vExam">-</span></span>
        <span>Class: <span id="vClass">-</span></span>
        <button id="loginBtn" onclick="toggleAdmin()" style="background:#333">Admin Login</button>
        <span id="syncStat" style="font-size: 10px; color: green;">● Live Online</span>
    </div>

    <div id="topHoldersBox">
        <div class="top-title">🏆 MERIT LIST (TOP 10)</div>
        <div class="top-list-container" id="topList"></div>
    </div>

    <div class="controls-panel">
        <select id="cSel" onchange="switchClass()"><option>Class Five</option><option>Class Six</option><option>Class Seven</option><option>Class Eight</option><option selected>Class Nine</option><option>Class Ten</option></select>
        <select id="gSel" onchange="switchClass()"><option>Science</option><option>Commerce</option><option>Arts</option></select>
        <select id="eSel" onchange="switchClass()"><option>Half Yearly Exam</option><option>Final Exam</option></select>

        <div class="admin-only">
            <input type="text" id="subInp" placeholder="Sub" style="width:50px">
            <button onclick="addSub()" style="background:var(--accent)">+Sub</button>
            <input type="text" id="nameInp" placeholder="Student" style="width:100px">
            <button onclick="addStu()" style="background:var(--accent)">+Stu</button>
            <button onclick="saveToCloud()" id="saveBtn" style="background:#6a1b9a">💾 UPDATE ONLINE</button>
        </div>
        <button style="background:var(--primary)" onclick="window.print()">🖨️ PRINT</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead><tr id="hRow"></tr></thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>
</div>

<script>
    // আপনার ফায়ারবেস কনফিগারেশন (নিচের তথ্যগুলো আপনার Firebase ড্যাশবোর্ড থেকে মিলিয়ে নিন)
    const firebaseConfig = {
        apiKey: "AIzaSyCcwdSFN9L8kD7QayZgaoqUvTVjbpzQ2mI",
        authDomain: "result-sheet-099.firebaseapp.com",
        databaseURL: "https://result-sheet-099-default-rtdb.firebaseio.com/", // <--- এটি আপনার Realtime Database লিঙ্ক দিয়ে বদলে দিন
        projectId: "result-sheet-099",
        storageBucket: "result-sheet-099.firebasestorage.app",
        messagingSenderId: "1052113315277",
        appId: "1:1052113315277:web:4d44ed3843db7969291084"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let subjects = [], students = [], marks = {}, fms = {};
    let isAdmin = false;

    // পাসওয়ার্ড দিয়ে এডমিন লগইন (পাসওয়ার্ড: #$t)
    function toggleAdmin() {
        if(!isAdmin) {
            if(prompt("Password:") === "#$t") {
                isAdmin = true;
                document.getElementById('mainBody').classList.add('is-admin');
                document.getElementById('loginBtn').innerText = "Logout";
            }
        } else { isAdmin = false; document.getElementById('mainBody').classList.remove('is-admin'); document.getElementById('loginBtn').innerText = "Admin Login"; }
        render();
    }

    // ডাটাবেস পাথ তৈরি
    function getPath() {
        const key = `${document.getElementById('cSel').value}_${document.getElementById('gSel').value}_${document.getElementById('eSel').value}`;
        return `results/${key.replace(/\s+/g, '_')}`;
    }

    // ক্লাস বা এক্সাম পরিবর্তনের সাথে সাথে ডাটা লোড
    function switchClass() {
        document.getElementById('vClass').innerText = document.getElementById('cSel').value;
        document.getElementById('vExam').innerText = document.getElementById('eSel').value;
        
        db.ref(getPath()).on('value', (snap) => {
            const data = snap.val() || {};
            subjects = data.subjects || [];
            students = data.students || [];
            marks = data.marks || {};
            fms = data.fms || {};
            render();
        });
    }

    // অনলাইনে ডাটা সেভ করা
    function saveToCloud() {
        if(!isAdmin) return;
        document.getElementById('saveBtn').innerText = "Saving...";
        db.ref(getPath()).set({ subjects, students, marks, fms })
          .then(() => { alert("Online Update Success!"); document.getElementById('saveBtn').innerText = "💾 UPDATE ONLINE"; });
    }

    function render() {
        const head = document.getElementById('hRow');
        const body = document.getElementById('tBody');
        head.innerHTML = `<th>SL</th><th>Student Name</th>` + subjects.map((s, i) => `<th>${s}<br><input type="number" class="mark-input" value="${fms[i]||100}" oninput="fms[${i}]=this.value;calc()" ${isAdmin?'':'disabled'} style="width:40px; font-size:10px"></th>`).join('') + `<th>Total</th><th>Res</th><th>Pos</th>`;
        
        body.innerHTML = students.map((n, sIdx) => `<tr><td>${sIdx+1}</td><td style="text-align:left">${n}</td>` + subjects.map((_, subIdx) => `<td><input type="number" class="mark-input" value="${marks[sIdx+'_'+subIdx]||0}" oninput="marks['${sIdx+'_'+subIdx}']=this.value;calc()" ${isAdmin?'':'disabled'}></td>`).join('') + `<td class="r-total">0</td><td class="r-res">-</td><td class="r-pos">-</td></tr>`).join('');
        calc();
    }

    function calc() {
        const rows = document.querySelectorAll('#tBody tr');
        let dataList = [];
        rows.forEach((row, sIdx) => {
            let total = 0, isFail = false;
            subjects.forEach((_, subIdx) => {
                let m = parseFloat(marks[sIdx+'_'+subIdx]) || 0;
                let fm = parseFloat(fms[subIdx]) || 100;
                total += m; if(m < fm*0.33) isFail = true;
            });
            row.querySelector('.r-total').innerText = total;
            row.querySelector('.r-res').innerHTML = isFail ? '<span class="status-badge fail">Fail</span>' : '<span class="status-badge pass">Pass</span>';
            dataList.push({ sIdx, total, isFail, name: students[sIdx] });
        });

        // পজিশন ক্যালকুলেশন (সবার জন্য)
        let rankedAll = [...dataList].sort((a,b) => b.total - a.total);
        dataList.forEach(s => {
            let rank = rankedAll.findIndex(x => x.total === s.total) + 1;
            rows[s.sIdx].querySelector('.r-pos').innerText = rank;
        });

        // মেরিট লিস্ট (শুধু পাস করাদের জন্য)
        let meritList = dataList.filter(s => !s.isFail).sort((a,b) => b.total - a.total);
        updateTopHolders(meritList);
    }

    function updateTopHolders(list) {
        const box = document.getElementById('topHoldersBox');
        let filtered = list.slice(0, 10);
        if(!filtered.length) { box.style.display = 'none'; return; }
        box.style.display = 'block';
        document.getElementById('topList').innerHTML = filtered.map((r, i) => `<div class="rank-item">🏆 ${i+1}st - ${r.name} (${r.total})</div>`).join('');
    }

    function addSub() { let v = document.getElementById('subInp').value; if(v){ subjects.push(v); render(); } }
    function addStu() { let v = document.getElementById('nameInp').value; if(v){ students.push(v); render(); } }

    window.onload = switchClass;
</script>
</body>
</html>
