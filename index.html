<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glorious Education Care - Final Online Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #1b5e20; --accent: #0078d4; --danger: #d32f2f; --table-border: #000; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #bee2a4cb; margin: 0; padding: 10px; }
        .container { max-width: 297mm; width: 100%; min-height: 210mm; margin: auto; background: #fff; border: 1px solid #ccc; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .admin-only { display: none; }
        .is-admin .admin-only { display: inline-block; }
        .excel-header { background: linear-gradient(to right, #76b852 0%, #8dc26f 60%, #e1f291 100%) !important; padding: 15px 20px; border-bottom: 3px solid #1b5e20; -webkit-print-color-adjust: exact; }
        .bismillah { text-align: center; font-size: 13px; font-weight: bold; margin: 0 0 5px 0; }
        .header-content { display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo { height: 80px; width: 80px; background: white; border-radius: 50%; border: 2px solid #1b5e20; object-fit: contain; }
        .main-title-box { background: #002233; color: white !important; padding: 4px 20px; border-radius: 0 40px 40px 40px; }
        .main-title-box h1 { margin: 0; font-size: 26px; text-transform: uppercase; display: inline; }
        .main-title-box span { font-size: 18px; margin-left: 8px; }
        .header-right-address { text-align: right; font-size: 11px; color: #000; font-weight: bold; line-height: 1.3; }
        .info-bar { background: #e8f5e9 !important; padding: 10px; border-bottom: 1px solid #c8e6c9; display: flex; justify-content: center; gap: 30px; font-weight: bold; font-size: 15px; color: #1b5e20; }
        
        #topHoldersBox { display: none; margin: 15px; padding: 15px; border: 2px solid var(--primary); background: #fff; }
        .top-title { font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: 10px; font-size: 16px; }
        .top-list-container { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
        .merit-column { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 250px; }
        
        .controls-panel { background: #f5f5f5; padding: 15px; border-bottom: 1px solid #ddd; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-items: center; }
        .show-hide-box { background: #fff; border: 1px solid #ccc; padding: 5px 10px; display: flex; gap: 10px; font-size: 12px; font-weight: bold; color: var(--primary); }
        
        input, select { padding: 6px; border: 1px solid #999; border-radius: 4px; font-weight: bold; outline: none; background: #fff; }
        button { padding: 7px 12px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; color: white; font-size: 12px; }
        .btn-add { background: var(--accent); }
        .btn-print { background: var(--primary); }
        .btn-sync { background: #6a1b9a; }
        .btn-login { background: #333; }
        .btn-remove { background: #ff5722; margin-left: -5px; }

        .table-wrap { padding: 10px; width: 100%; box-sizing: border-box; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; word-break: break-all; }
        th, td { border: 1px solid var(--table-border); padding: 4px 2px; text-align: center; }
        
        th:nth-child(1) { width: 35px; }
        th:nth-child(2), td:nth-child(2) { 
            width: 150px !important; 
            min-width: 150px !important; 
            max-width: 150px !important;
            text-align: left; 
            padding-left: 8px;
            background: #fff;
            position: sticky;
            left: 0;
            z-index: 2;
        }

        /* 100 mark er box size choto kora hoyeche */
        .fm-input { 
            width: 32px; /* Size choto kora holo */
            padding: 3px;
            border: 2px solid #000; 
            text-align: center; 
            font-weight: bold; 
            font-size: 10px; 
            margin: 2px auto; 
            box-shadow: none !important;
            outline: none !important;
            border-radius: 2px;
            display: block;
        }
        
        input.mark-input { 
            width: 100%; 
            border: none !important; 
            background: transparent; 
            font-weight: bold; 
            text-align: center; 
            font-size: 11px; 
            box-shadow: none !important;
            outline: none !important;
        }

        input.stu-name-input { 
            width: 100%; 
            border: none; 
            background: transparent !important; 
            font-weight: bold; 
            outline: none; 
            pointer-events: none; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            box-shadow: none !important;
        }
        .is-admin input.stu-name-input { 
            pointer-events: auto; 
            background: transparent !important; 
        }

        .status-badge { padding: 2px 4px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .pass { background: #c8e6c9; color: #1b5e20; }
        .fail { background: #ffcdd2; color: #b71c1c; }
        .btn-del { color: red; cursor: pointer; font-weight: bold; display: none; margin-left: 4px; font-size: 14px; }
        .is-admin .btn-del { display: inline; }

        @media print {
            @page { size: A4 landscape; margin: 3mm; }
            body { background: white; padding: 0; }
            .container { width: 100% !important; border: none !important; box-shadow: none !important; transform: scale(0.98); transform-origin: top center; }
            .controls-panel, .btn-del, .admin-only, .btn-login, .show-hide-box { display: none !important; }
            th:nth-child(2), td:nth-child(2) { position: static !important; width: 130px !important; min-width: 130px !important; }
            table { font-size: 9px; width: 100% !important; }
            .table-wrap { overflow: visible !important; padding: 0 !important; }
            .header-logo { height: 60px; width: 60px; }
            .main-title-box h1 { font-size: 20px; }
            th, td { padding: 2px 1px !important; }
            .fm-input { border: none !important; } /* Print e border chara clean dekhabe */
        }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <div class="excel-header">
        <p class="bismillah">বিসমিল্লাহির রাহমানির রাহিম</p>
        <div class="header-content">
            <div class="header-left">
                <img src="logo.jpeg" alt="Logo" class="header-logo">
                <div class="header-mid">
                    <p style="margin:0; font-weight:bold; color:#1b5e20">সৃজনশীল প্রতিভার অন্বেষণে..........</p>
                    <div class="main-title-box"><h1>GLORIOUS</h1><span>Education Care</span></div>
                </div>
            </div>
            <div class="header-right-address">ফরিদুল হক চৌধুরী মার্কেট (২য় তলা),<br>পেকুয়া চৌমুহনীর পশ্চিম পার্শ্বে, পেকুয়া।<br>📞 ০১৮৬৮-৬৫৩৭২২</div>
        </div>
    </div>
    
    <div class="info-bar">
        <span>Exam: <span id="vExam">-</span></span>
        <span>Class: <span id="vClass">-</span></span>
        <span id="groupDisplayArea">Group: <span id="vGroup">-</span></span>
        <button class="btn-login" id="loginBtn" onclick="toggleAdmin()">Admin Login</button>
        <span id="syncStat" style="font-size: 10px; color: green; margin-left: 10px;">● Online</span>
    </div>

    <div id="topHoldersBox">
        <div class="top-title">🏆 MERIT LIST (TOP 10)</div>
        <div class="top-list-container" id="topList"></div>
    </div>

    <div class="controls-panel">
        <select id="cSel" onchange="updateInfo()">
            <option>Class Five</option><option>Class Six</option><option>Class Seven</option><option>Class Eight</option>
            <option selected>Class Nine</option><option>Class Ten</option><option>SSC Special Batch</option>
        </select>
        <select id="gSel" onchange="updateInfo()"><option value="Science">Science</option><option value="Commerce">Commerce</option><option value="Arts">Arts</option></select>
        
        <div style="display: flex; align-items: center; gap: 5px;">
            <select id="eSel" onchange="updateInfo()"></select>
            <button class="btn-remove admin-only" onclick="removeExam()">Remove</button>
        </div>

        <div class="show-hide-box">
            <label><input type="checkbox" id="chkTotal" checked onchange="toggleCols()"> Total</label>
            <label><input type="checkbox" id="chkPct" checked onchange="toggleCols()"> %</label>
            <label><input type="checkbox" id="chkRes" checked onchange="toggleCols()"> Res</label>
            <label><input type="checkbox" id="chkPos" checked onchange="toggleCols()"> Pos</label>
        </div>

        <div class="admin-only">
            <input type="text" id="examInp" placeholder="New Exam" style="width:90px">
            <button class="btn-add" onclick="addExam()">+ Exam</button>
            <input type="text" id="subInp" placeholder="Sub" style="width:50px">
            <button class="btn-add" onclick="addSub()">+Sub</button>
            <input type="text" id="nameInp" maxlength="25" placeholder="Student Name" style="width:110px">
            <button class="btn-add" onclick="addStu()">+Student</button>
            <button class="btn-sync" onclick="syncToAll()">🔄 Sync</button>
            <button class="btn-sync" id="saveBtn" style="background:#6a1b9a" onclick="saveToCloud()">💾 Save</button>
        </div>
        <button class="btn-print" onclick="window.print()">🖨️ Print Result</button>
    </div>

    <div class="table-wrap">
        <table id="resTable">
            <thead><tr id="hRow"></tr></thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCcwdSFN9L8kD7QayZgaoqUvTVjbpzQ2mI",
        authDomain: "result-sheet-099.firebaseapp.com",
        databaseURL: "https://result-sheet-099-default-rtdb.firebaseio.com/",
        projectId: "result-sheet-099",
        storageBucket: "result-sheet-099.firebasestorage.app",
        messagingSenderId: "1052113315277",
        appId: "1:1052113315277:web:4d44ed3843db7969291084"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let subjects = [], students = [], marks = {}, fms = {}; 
    let examsList = ["Half Yearly Exam", "Final Exam"];
    let isAdmin = false;

    function toggleAdmin() {
        if(!isAdmin) {
            if(prompt("Admin Password:") === "#$t") {
                isAdmin = true;
                document.getElementById('mainBody').classList.add('is-admin');
                document.getElementById('loginBtn').innerText = "Logout Admin";
            }
        } else {
            isAdmin = false;
            document.getElementById('mainBody').classList.remove('is-admin');
            document.getElementById('loginBtn').innerText = "Admin Login";
        }
        render();
    }

    function getPath(examName = null) {
        const c = document.getElementById('cSel').value;
        const e = examName || document.getElementById('eSel').value;
        const noGrp = ['Class Six', 'Class Seven', 'Class Eight', 'Class Five'];
        const g = noGrp.includes(c) ? 'General' : document.getElementById('gSel').value;
        return `results/${c}_${g}_${e}`.replace(/\s+/g, '_');
    }

    function renderExams() {
        db.ref('exams_list').on('value', (snap) => {
            const list = snap.val();
            if(list) {
                examsList = list;
                const current = document.getElementById('eSel').value;
                document.getElementById('eSel').innerHTML = examsList.map(e => `<option>${e}</option>`).join('');
                if(examsList.includes(current)) document.getElementById('eSel').value = current;
            }
        });
    }

    function addExam() {
        let v = document.getElementById('examInp').value.trim();
        if(v && !examsList.includes(v)) {
            examsList.push(v);
            db.ref('exams_list').set(examsList);
            document.getElementById('examInp').value = '';
        }
    }

    function removeExam() {
        const currentExam = document.getElementById('eSel').value;
        if(isAdmin && confirm(`Are you sure you want to remove "${currentExam}"?`)) {
            examsList = examsList.filter(e => e !== currentExam);
            db.ref('exams_list').set(examsList).then(() => { updateInfo(); });
        }
    }

    function updateInfo() {
        const cls = document.getElementById('cSel').value;
        const noGrp = ['Class Six', 'Class Seven', 'Class Eight', 'Class Five'];
        document.getElementById('gSel').style.display = noGrp.includes(cls) ? 'none' : 'inline-block';
        document.getElementById('vClass').innerText = cls;
        document.getElementById('vGroup').innerText = noGrp.includes(cls) ? "General" : document.getElementById('gSel').value;
        document.getElementById('vExam').innerText = document.getElementById('eSel').value;
        
        db.ref(getPath()).on('value', (snap) => {
            const data = snap.val() || {};
            subjects = data.subjects || [];
            students = data.students || [];
            marks = data.marks || {};
            fms = data.fms || {};
            render();
        });
    }

    function saveToCloud() {
        if(!isAdmin) return;
        document.getElementById('saveBtn').innerText = "Saving...";
        db.ref(getPath()).set({ subjects, students, marks, fms })
          .then(() => { alert("Online Saved!"); document.getElementById('saveBtn').innerText = "💾 Save"; });
    }

    function syncToAll() {
        if(!isAdmin || !confirm("Sync students/subjects to ALL exams of this class?")) return;
        examsList.forEach(ex => {
            const path = getPath(ex);
            db.ref(path).once('value', (snap) => {
                let data = snap.val() || {};
                data.subjects = subjects;
                data.students = students;
                data.fms = fms;
                db.ref(path).set(data);
            });
        });
        alert("Sync Completed!");
    }

    function render() {
        const head = document.getElementById('hRow');
        const body = document.getElementById('tBody');
        let hHtml = `<th style="width:35px">SL</th><th style="width:150px">Student Name</th>`;
        subjects.forEach((s, i) => {
            hHtml += `<th>
                <span contenteditable="${isAdmin}" style="display:block; min-height:1.2em;" onblur="subjects[${i}]=this.innerText">${s}</span>
                <input type="number" class="fm-input" value="${fms[i]||100}" oninput="fms[${i}]=this.value;calc()" ${isAdmin?'':'disabled'}>
                <span class="btn-del" onclick="delSub(${i})">×</span></th>`;
        });
        hHtml += `<th class="cell-total" style="width:45px">Total</th><th class="cell-pct" style="width:40px">%</th><th class="cell-res" style="width:45px">Res</th><th class="cell-pos" style="width:40px">Pos</th>`;
        head.innerHTML = hHtml;

        let bHtml = '';
        students.forEach((name, sIdx) => {
            bHtml += `<tr><td>${sIdx+1}</td><td>
                <input type="text" class="stu-name-input" value="${name}" oninput="students[sIdx]=this.value">
                <span class="btn-del" onclick="delStu(${sIdx})">×</span></td>`;
            subjects.forEach((_, subIdx) => {
                let mKey = `${sIdx}_${subIdx}`;
                bHtml += `<td><input type="number" class="mark-input" value="${marks[mKey]||0}" oninput="marks['${mKey}']=this.value;calc()"></td>`;
            });
            bHtml += `<td class="r-total cell-total">0</td><td class="r-pct cell-pct">0%</td><td class="r-res cell-res">-</td><td class="r-pos cell-pos">-</td></tr>`;
        });
        body.innerHTML = bHtml;
        calc(); toggleCols();
    }

    function calc() {
        const rows = document.querySelectorAll('#tBody tr');
        let dataList = [];
        rows.forEach((row, sIdx) => {
            let total = 0, fullMark = 0, isFail = false;
            subjects.forEach((_, subIdx) => {
                let m = parseFloat(marks[`${sIdx}_${subIdx}`]) || 0;
                let fm = parseFloat(fms[subIdx]) || 100;
                total += m; fullMark += fm;
                if(m < (fm * 0.33)) isFail = true;
            });
            row.querySelector('.r-total').innerText = total;
            row.querySelector('.r-pct').innerText = (fullMark > 0 ? Math.round((total/fullMark)*100) : 0) + '%';
            row.querySelector('.r-res').innerHTML = isFail ? '<span class="status-badge fail">Fail</span>' : '<span class="status-badge pass">Pass</span>';
            dataList.push({ sIdx, total, name: students[sIdx], isFail: isFail });
        });

        let tableRanked = [...dataList].sort((a,b) => b.total - a.total);
        let meritListRanked = dataList.filter(s => !s.isFail).sort((a,b) => b.total - a.total);

        dataList.forEach(s => {
            let rank = tableRanked.findIndex(x => x.total === s.total) + 1;
            rows[s.sIdx].querySelector('.r-pos').innerHTML = `<span style="font-weight:800">${rank}</span>`;
        });
        updateTopHolders(meritListRanked);
    }

    function updateTopHolders(passedRanked) {
        const box = document.getElementById('topHoldersBox');
        let filtered = passedRanked.filter(r => r.name && r.total > 0).slice(0, 10);
        if(!filtered.length) { box.style.display = 'none'; return; }
        box.style.display = 'block';
        let htmlItems = filtered.map((r, i) => {
            let medal = (i + 1) + "th";
            if (i === 0) medal = "🥇 1st"; else if (i === 1) medal = "🥈 2nd"; else if (i === 2) medal = "🥉 3rd";
            return `<div class="rank-item"><span>${medal}</span> <span>${r.name} (${r.total})</span></div>`;
        });
        document.getElementById('topList').innerHTML = `<div class="merit-column">${htmlItems.slice(0,4).join('')}</div><div class="merit-column">${htmlItems.slice(4,7).join('')}</div><div class="merit-column">${htmlItems.slice(7,10).join('')}</div>`;
    }

    function toggleCols() {
        const t = document.getElementById('chkTotal').checked;
        const p = document.getElementById('chkPct').checked;
        const r = document.getElementById('chkRes').checked;
        const s = document.getElementById('chkPos').checked;
        document.querySelectorAll('.cell-total').forEach(el => el.style.display = t ? '' : 'none');
        document.querySelectorAll('.cell-pct').forEach(el => el.style.display = p ? '' : 'none');
        document.querySelectorAll('.cell-res').forEach(el => el.style.display = r ? '' : 'none');
        document.querySelectorAll('.cell-pos').forEach(el => el.style.display = s ? '' : 'none');
    }

    function addSub() { if(isAdmin) { let v = document.getElementById('subInp').value; if(v){ subjects.push(v); document.getElementById('subInp').value=''; render(); } } }
    function addStu() { if(isAdmin) { let v = document.getElementById('nameInp').value.trim(); if(v){ students.push(v); document.getElementById('nameInp').value=''; render(); } } }
    function delSub(i) { if(isAdmin && confirm("Delete?")) { subjects.splice(i,1); render(); } }
    function delStu(i) { if(isAdmin && confirm("Delete?")) { students.splice(i,1); render(); } }

    window.onload = () => { renderExams(); updateInfo(); };
</script>
</body>
</html>
